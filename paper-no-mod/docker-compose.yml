version: '3.8'

services:
  mc-server:
    image: itzg/minecraft-server:latest
    container_name: minecraft-server
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "26.2" # Change to your preferred version
      WORLD_SEED: "-410552751819709174"
      MEMORY: "3G"      # Keeps 1GB free for the OS
      # Aikar's flags for optimized Java GC
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1"
    volumes:
      - ./data:/data
    networks:
      - shared
    restart: unless-stopped
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 4G
    networks:
      shared:
        external: true